services:
  - type: web
    name: mfmiyc-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/members/health
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        value: 17CmL_QBemTZeN1ZnOn1lJu9msH0Vv-xFtQj0U6woS7E
      - key: GOOGLE_SHEET_NAME
        value: Sheet1
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
