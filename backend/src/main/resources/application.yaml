spring:
  application:
    name: mfmiyc-member-form-api
  config:
    import: optional:file:.env[.properties]

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}

google:
  service-account:
    file: ${GOOGLE_SERVICE_ACCOUNT_FILE:}
    json: ${GOOGLE_SERVICE_ACCOUNT_JSON:}
  sheets:
    spreadsheet-id: ${GOOGLE_SPREADSHEET_ID}
    sheet-name: ${GOOGLE_SHEET_NAME:Sheet1}
